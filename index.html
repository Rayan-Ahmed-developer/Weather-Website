<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Project</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="head">
             <input type="text" placeholder="Enter City Name">
             <div id="search"><i class="fa-solid fa-magnifying-glass"></i></div>
        </div>
       <div class="cloud">
          <i id="weatherIcon" class="fa-solid fa-sun"></i>
        </div>
          <div class="centre">
            <p id="degree">What's </p>
            <p id="city">Weather Today</p>
          </div>
        <div class="icon">
            <div id="water"><i class="fa-solid fa-water"></i><p id="para1">0%</p></div>
            <div id="wind"><i class="fa-solid fa-wind"></i><p id="para2">0.0Km/h</p></div>
       </div>
       <div class="names">
        <p>Humidity</p>
        <p>Wind Speed</p>
       </div>
    </div>
    <script src="weather.js"></script>
</body>
</html>
